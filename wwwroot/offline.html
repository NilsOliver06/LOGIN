<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sin Conexión - Candy Shoes 🍬👟</title>

    <!-- Google Fonts (Poppins) -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet" />

    <!-- Font Awesome para el icono de advertencia -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <style>
        :root {
            --primary-color: #FF6B6B;
            --secondary-color: #FFE6E6;
            --text-color: #4A4A4A;
            --bg-color: #FAFAFA;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        .offline-container {
            max-width: 450px;
            padding: 2.5rem;
            margin: 1rem;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            border: 2px solid var(--secondary-color);
        }

        .icon-wrapper {
            width: 100px;
            height: 100px;
            background-color: var(--secondary-color);
            color: var(--primary-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem auto;
            font-size: 2.5rem;
            animation: pulse 2s infinite;
        }

        h1 {
            color: var(--primary-color);
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            font-weight: 700;
        }

        p {
            font-size: 1rem;
            line-height: 1.6;
            color: #777777;
            margin-bottom: 2rem;
        }

        .btn-retry {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 0.8rem 2rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.3);
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

            .btn-retry:hover {
                background-color: #ff5252;
                transform: translateY(-2px);
                box-shadow: 0 8px 20px rgba(255, 107, 107, 0.4);
            }

            .btn-retry:active {
                transform: translateY(0);
            }

        @keyframes pulse {
            0% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(255, 107, 107, 0.4);
            }

            70% {
                transform: scale(1.05);
                box-shadow: 0 0 0 15px rgba(255, 107, 107, 0);
            }

            100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(255, 107, 107, 0);
            }
        }
    </style>
</head>
<body>

    <div class="offline-container">
        <div class="icon-wrapper">
            <i class="fas fa-wifi-slash"></i>
        </div>
        <h1>¡Ups! Estás sin conexión</h1>
        <p>Parece que perdiste la señal de internet. No te preocupes, el catálogo de Candy Shoes volverá a estar disponible en cuanto recuperes tus datos o te conectes a una red Wi-Fi.</p>

        <!-- Botón que recarga la página actual para reintentar la conexión -->
        <button class="btn-retry" onclick="window.location.reload();">
            <i class="fas fa-redo-alt me-2"></i> Reintentar conexión
        </button>
    </div>

</body>
</html>
